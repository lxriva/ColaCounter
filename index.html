      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Dark overlay — rgba(0,0,0,0.34) from source */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.34);
      z-index: 1;
    }

    /* ── Content above everything ── */
    #screen {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top, 28px), 28px) 22px max(env(safe-area-inset-bottom, 34px), 34px);
    }

    /* ── Top area ── */
    #top-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #top-logo {
      width: min(78vw, 360px);
      height: auto;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    #toggle-row {
      width: 100%;
      max-width: 360px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #mode-label {
      flex: 1;
      margin-right: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
    }

    /* iOS-style toggle */
    .sw {
      position: relative;
      width: 51px;
      height: 31px;
      flex-shrink: 0;
    }
    .sw input { display: none; }
    .sw-track {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(120,120,128,0.32);
      transition: background 0.22s;
      cursor: pointer;
    }
    .sw input:checked + .sw-track { background: #34c759; }
    .sw-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 27px; height: 27px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      transition: transform 0.22s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .sw input:checked ~ .sw-knob { transform: translateX(20px); }

    /* ── Middle — main button ── */
    #middle {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #coke-btn {
      /* 62vw on phone, capped at 290px — matches source */
      width: min(62vw, 290px);
      height: min(62vw, 290px);
      border-radius: 50%;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      outline: none;
      display: block;
      /* spring-like press via CSS */
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }

    #coke-btn:active {
      transform: scale(0.94);
      transition: transform 0.06s ease-out;
    }

    #coke-btn img {
      width: 100%; height: 100%;
      border-radius: 50%;
      display: block;
      pointer-events: none;
      object-fit: cover;
    }

    /* ripple ring on tap */
    @keyframes ripple {
      0%   { opacity: 0.5; transform: scale(0.92); }
      70%  { opacity: 0;   transform: scale(1.12); }
      100% { opacity: 0;   transform: scale(1.12); }
    }
    #ripple {
      position: absolute;
      width: min(62vw, 290px);
      height: min(62vw, 290px);
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.85);
      pointer-events: none;
      opacity: 0;
    }
    #ripple.go { animation: ripple 0.38s ease-out forwards; }

    /* ── Bottom area ── */
    #bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 6px;
    }

    #count-label {
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      text-align: center;
      margin-bottom: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
    }

    #actions {
      display: flex;
      flex-direction: row;
      gap: 14px;
      justify-content: center;
    }

    .action-btn {
      padding: 10px 22px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, transform 0.1s;
    }

    #reset-btn {
      background: rgba(255,255,255,0.24);
    }

    .action-btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.38);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="screen">

    <!-- Bottom -->
    <div id="bottom">
      <div id="count-label">Cans consumed: 0.0</div>
      <div id="actions">
        <button class="action-btn" id="undo-btn">Undo</button>
        <button class="action-btn" id="reset-btn">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Constants matching index.tsx exactly ──
  const STORAGE_KEY = 'colaCounterTotalCans_v1';
  const INC_CAN    = 10;   // integer units; display = total / 10
  const INC_BOTTLE = 15;

  // ── State ──
  let total      = 0;   // stored as integer (×10)
  let isBottle   = false;

  // ── Elements ──
  const countLabel  = document.getElementById('count-label');
  const modeLabel   = document.getElementById('mode-label');
  const modeToggle  = document.getElementById('mode-toggle');
  const cokeBtn     = document.getElementById('coke-btn');
  const undoBtn     = document.getElementById('undo-btn');
  const resetBtn    = document.getElementById('reset-btn');
  const ripple      = document.getElementById('ripple');

  // ── Persistence ──
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw !== null) {
        const n = parseInt(raw, 10);
        if (!Number.isNaN(n)) total = n;
      }
    } catch(e) {}
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, String(total)); } catch(e) {}
  }

  // ── Render ──
  function render() {
    countLabel.textContent = 'Cans consumed: ' + (total / 10).toFixed(1);
    modeLabel.textContent  = isBottle ? 'Bottle Mode (+1.5 cans)' : 'Can Mode (+1 can)';
    modeToggle.checked     = isBottle;
  }

  // ── Ripple ──
  function fireRipple() {
    ripple.classList.remove('go');
    void ripple.offsetWidth;
    ripple.classList.add('go');
  }

  // ── Handlers ──
  cokeBtn.addEventListener('click', () => {
    total += isBottle ? INC_BOTTLE : INC_CAN;
    save(); render(); fireRipple();
  });

  modeToggle.addEventListener('change', () => {
    isBottle = modeToggle.checked;
    render();
  });

  undoBtn.addEventListener('click', () => {
    // mirrors: setTotal(t => Math.max(0, t - increment))
    total = Math.max(0, total - (isBottle ? INC_BOTTLE : INC_CAN));
    save(); render();
  });

  resetBtn.addEventListener('click', () => {
    total = 0;
    save(); render();
  });

  // ── Init ──
  load();
  render();
</script>
</body>
</html>
